[extension]
id = "sidex.hello-extension"
name = "Hello Extension"
version = "0.1.0"
description = "A sample SideX extension written in Rust"
wasm = "target/wasm32-wasip2/release/hello_extension.wasm"

[activation]
events = ["*"]

[contributes]
languages = []
commands = [
  { id = "hello.sayHello", title = "Say Hello" },
]
