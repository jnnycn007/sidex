name: Lint JS/TS

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/lint-js.yml"
      - "src/**"
      - "tsconfig.json"
      - "eslint.config.*"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/lint-js.yml"
      - "src/**"
      - "tsconfig.json"
      - "eslint.config.*"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: lint-js-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
