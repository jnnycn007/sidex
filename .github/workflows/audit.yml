name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/audit.yml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/audit.yml"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
